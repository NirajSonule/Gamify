<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary meta data -->
    <title>Gamify</title>
    <meta name="title" content="Gamify">
    <meta name="description" content="Find the games according to your taste and PC specification">

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assests/favicon.svg" type="image/svg+xml">

    <!-- preload fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Bebas neue -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Icon link -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet"/>

    <!-- Custom css -->
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/home.css">

    <!-- preload images -->
    <link rel="preload" as="image" href="./assests/logo/logo-primary.svg">
    <link rel="preload" as="image" href="./assests/logo/logo-secondary.svg">
    <link rel="preload" as="image" href="./assests/hero/hero_bg.jpg">
    <link rel="preload" as="image" href="./assests/hero/hero-img.png">
    
    <!-- Profile img -->
    <link rel="preload" as="image" href="./assests/profile/profile-1.png">
    <link rel="preload" as="image" href="./assests/profile/profile-2.png">
    <link rel="preload" as="image" href="./assests/profile/profile-3.png">

</head>
<body>
    <!-- Header -->

    <header class="header" data-header>
        <div class="container">
            <a href="/home.html" class="logo">
                <img src="./assests/logo/logo-primary.svg" alt="Gamigy Logo" class="logo-primary">
            </a>
            <nav class="nav-container" id="navbar">
                <div class="navbar-top">
                    <a href="/home.html" class="logo">
                        <img src="./assests/logo/logo-secondary.svg" alt="Gamigy Logo" class="logo-primary">
                    </a>
                    <button class="nav-open-btn" aria-label="close menu" data-nav-toggler>
                        <ion-icon name="close-outline" aria-hidden="true"></ion-icon>
                    </button>
                </div>
                <ul class="nav-links">
                    <li class="nav-link"><a href="/home.html">HOME</a></li>
                    <li class="nav-link"><a href="#">EXPLORE</a></li>
                    <li class="nav-link"><a href="#">ABOUT US</a></li>
                    <li class="nav-link"><a href="#">CONTACT US</a></li>
                </ul>
                <button class="btn-primary">LOG IN / SIGNUP</button>
            </nav>
            <button class="nav-open-btn" aria-label="open menu" data-nav-toggler>
                <ion-icon name="menu-outline" aria-hidden="true"></ion-icon>
            </button>
        </div>
    </header>

    <!-- Main -->
    <main>
        <article>
            <section class="hero-section has-img">
                <div class="hero-container container">
                    <div class="hero-content">
                        <h1 class="hero-title">Explore the world of pixelated <span class="hero-title-span">glory!</span></h1>
                        <p class="hero-text">Find the games according to your taste and PC specification</p>
                        <button class="btn-secondary">GET STARTED</button>
                    </div>
                    <img src="./assests/hero/hero-img.png" alt="hero-image" class="hero-img">
                </div>
            </section>
        </article>
    </main>

    <!-- Custom JS -->
    <script src="./js/common.js"></script>
    <script src="./js/home.js"></script>

    <!-- ionicon -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
